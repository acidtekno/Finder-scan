<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FingerTrack → TouchDesigner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@300;600;800&display=swap');

  :root {
    --cyan: #00ffee;
    --magenta: #ff00aa;
    --orange: #ff6600;
    --bg: #050810;
    --panel: rgba(0,20,40,0.85);
    --border: rgba(0,255,238,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,238,0.015) 2px, rgba(0,255,238,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Oxanium', monospace;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.1em;
  }
  .logo span { color: var(--magenta); }

  .status-row {
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.active { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .dot.warn    { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .dot.ok      { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

  /* Camera area */
  .cam-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
  }

  canvas#overlay {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .placeholder {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: rgba(0,255,238,0.4);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .placeholder svg {
    width: 64px; height: 64px;
    opacity: 0.3;
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    opacity: 0.4;
  }
  .corner.tl { top: 8px; left: 8px; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.tr { top: 8px; right: 8px; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
  .corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
  .corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

  /* FPS counter */
  .fps {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: rgba(0,255,238,0.5);
    letter-spacing: 0.1em;
  }

  /* Bottom panel */
  .panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(10px);
    padding: 10px 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  label {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(0,255,238,0.55);
    text-transform: uppercase;
  }

  input[type="text"] {
    background: rgba(0,255,238,0.05);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--cyan); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  button {
    font-family: 'Oxanium', monospace;
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 0;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
  }

  #btnCam {
    background: var(--cyan);
    color: var(--bg);
  }
  #btnCam:active { transform: scale(0.97); }
  #btnCam.active { background: var(--magenta); }

  #btnWS {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
  }
  #btnWS:active { transform: scale(0.97); }
  #btnWS.connected { border-color: #00ff88; color: #00ff88; }

  /* Finger data ticker */
  .ticker {
    margin-top: 8px;
    font-size: 0.6rem;
    color: rgba(0,255,238,0.4);
    letter-spacing: 0.06em;
    height: 16px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* Loading indicator */
  .loading-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--cyan);
    width: 0%;
    transition: width 0.3s;
    box-shadow: 0 0 8px var(--cyan);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .pulsing { animation: pulse 1s infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">FINGER<span>TRACK</span></div>
  <div class="status-row">
    <div class="dot" id="dotCam" title="Kamera"></div>
    <span style="font-size:0.6rem;opacity:0.5">CAM</span>
    <div class="dot" id="dotMP" title="MediaPipe"></div>
    <span style="font-size:0.6rem;opacity:0.5">ML</span>
    <div class="dot" id="dotWS" title="TouchDesigner"></div>
    <span style="font-size:0.6rem;opacity:0.5">TD</span>
  </div>
</header>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div class="placeholder" id="placeholder">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="16" width="48" height="36" rx="4" stroke="currentColor" stroke-width="2"/>
      <circle cx="32" cy="34" r="10" stroke="currentColor" stroke-width="2"/>
      <circle cx="32" cy="34" r="4" fill="currentColor"/>
      <rect x="24" y="12" width="16" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
    </svg>
    <span>Kliknij START aby włączyć kamerę</span>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="fps" id="fpsDisplay"></div>
  <div class="loading-bar" id="loadingBar"></div>
</div>

<div class="panel">
  <div class="panel-grid">
    <div class="field-group">
      <label>TouchDesigner IP</label>
      <input type="text" id="wsHost" value="192.168.1.100" placeholder="192.168.1.x">
    </div>
    <div class="field-group">
      <label>Port WebSocket</label>
      <input type="text" id="wsPort" value="9980" placeholder="9980">
    </div>
  </div>
  <div class="btn-row">
    <button id="btnCam" onclick="toggleCamera()">▶ START</button>
    <button id="btnWS" onclick="toggleWS()">⬡ CONNECT TD</button>
  </div>
  <div class="ticker" id="ticker">oczekiwanie na dane...</div>
</div>

<!-- MediaPipe via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('overlay');
const ctx      = canvas.getContext('2d');
const dotCam   = document.getElementById('dotCam');
const dotMP    = document.getElementById('dotMP');
const dotWS    = document.getElementById('dotWS');
const btnCam   = document.getElementById('btnCam');
const btnWS    = document.getElementById('btnWS');
const ticker   = document.getElementById('ticker');
const fpsEl    = document.getElementById('fpsDisplay');
const placeholder = document.getElementById('placeholder');
const loadingBar  = document.getElementById('loadingBar');
const camWrap  = document.getElementById('camWrap');

let hands = null, mpCamera = null, ws = null;
let camActive = false, wsConnected = false;
let lastFrame = 0, fps = 0, frameCount = 0, lastFPSTime = 0;
let lastResults = null;

// Finger tip indices in MediaPipe hand landmarks
const FINGER_TIPS = [4, 8, 12, 16, 20];
const FINGER_NAMES = ['THUMB', 'INDEX', 'MIDDLE', 'RING', 'PINKY'];

// Colors per finger
const FINGER_COLORS = ['#ff6600','#00ffee','#ff00aa','#aaff00','#aa00ff'];

function resizeCanvas() {
  canvas.width  = camWrap.offsetWidth;
  canvas.height = camWrap.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── MediaPipe Init ───────────────────────────────────────────────
function initMediaPipe() {
  loadingBar.style.width = '20%';
  dotMP.className = 'dot warn pulsing';

  hands = new Hands({
    locateFile: (f) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.6,
  });

  hands.onResults(onResults);
  loadingBar.style.width = '60%';
}

// ─── Camera ───────────────────────────────────────────────────────
async function toggleCamera() {
  if (!camActive) {
    await startCamera();
  } else {
    stopCamera();
  }
}

async function startCamera() {
  try {
    if (!hands) initMediaPipe();

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    placeholder.style.display = 'none';
    dotCam.className = 'dot ok';

    mpCamera = new Camera(video, {
      onFrame: async () => {
        if (hands) await hands.send({ image: video });
        countFPS();
      },
      width: 1280,
      height: 720,
    });
    mpCamera.start();

    camActive = true;
    btnCam.textContent = '■ STOP';
    btnCam.classList.add('active');
    loadingBar.style.width = '100%';
    setTimeout(() => { loadingBar.style.width = '0%'; }, 600);
    dotMP.className = 'dot ok';

  } catch (e) {
    console.error(e);
    dotCam.className = 'dot warn';
    ticker.textContent = 'Błąd kamery: ' + e.message;
  }
}

function stopCamera() {
  if (mpCamera) { mpCamera.stop(); mpCamera = null; }
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  camActive = false;
  btnCam.textContent = '▶ START';
  btnCam.classList.remove('active');
  dotCam.className = 'dot';
  dotMP.className = 'dot';
  placeholder.style.display = 'flex';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fpsEl.textContent = '';
}

function countFPS() {
  frameCount++;
  const now = performance.now();
  if (now - lastFPSTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastFPSTime = now;
    fpsEl.textContent = `${fps} FPS`;
  }
}

// ─── Draw Results ─────────────────────────────────────────────────
function onResults(results) {
  lastResults = results;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Mirror context to match flipped video
  ctx.save();
  ctx.scale(-1, 1);
  ctx.translate(-canvas.width, 0);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    ctx.restore();
    sendToTD(null);
    return;
  }

  const tdData = [];

  results.multiHandLandmarks.forEach((landmarks, handIdx) => {
    const handedness = results.multiHandedness?.[handIdx]?.label || 'Unknown';

    // Draw skeleton connections
    drawConnections(landmarks, handIdx);

    // Draw all landmark dots
    landmarks.forEach((lm, i) => {
      const x = lm.x * canvas.width;
      const y = lm.y * canvas.height;
      const isTip = FINGER_TIPS.includes(i);

      if (isTip) {
        const fi = FINGER_TIPS.indexOf(i);
        const color = FINGER_COLORS[fi];
        // Outer glow ring
        ctx.beginPath();
        ctx.arc(x, y, 18, 0, Math.PI * 2);
        ctx.strokeStyle = color + '44';
        ctx.lineWidth = 8;
        ctx.stroke();
        // Main circle
        ctx.beginPath();
        ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fillStyle = color + 'cc';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Crosshair
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.moveTo(x-22, y); ctx.lineTo(x+22, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y-22); ctx.lineTo(x, y+22); ctx.stroke();
        ctx.globalAlpha = 1;
        // Label
        ctx.fillStyle = '#fff';
        ctx.font = '700 9px "Share Tech Mono"';
        ctx.textAlign = 'center';
        ctx.fillText(FINGER_NAMES[fi][0], x, y - 16);
      } else {
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,255,238,0.5)';
        ctx.fill();
      }
    });

    // Hand label
    const wrist = landmarks[0];
    ctx.font = '600 11px "Oxanium"';
    ctx.fillStyle = handIdx === 0 ? '#00ffee' : '#ff00aa';
    ctx.textAlign = 'center';
    ctx.fillText(handedness.toUpperCase() + ' HAND', wrist.x * canvas.width, wrist.y * canvas.height + 24);

    // Build TD data
    const fingers = FINGER_TIPS.map((tipIdx, fi) => {
      const lm = landmarks[tipIdx];
      return {
        name: FINGER_NAMES[fi],
        x: parseFloat((1 - lm.x).toFixed(4)),   // mirror X for real-world coords
        y: parseFloat(lm.y.toFixed(4)),
        z: parseFloat(lm.z.toFixed(4))
      };
    });

    tdData.push({ hand: handedness, fingers });
  });

  ctx.restore();

  // Ticker update
  if (tdData.length > 0) {
    const f0 = tdData[0].fingers;
    ticker.textContent = `[${tdData[0].hand}] INDEX(${f0[1].x},${f0[1].y}) MIDDLE(${f0[2].x},${f0[2].y}) — ${tdData.length} hand(s)`;
  } else {
    ticker.textContent = 'brak dłoni w kadrze';
  }

  sendToTD(tdData.length ? tdData : null);
}

function drawConnections(lms, hIdx) {
  const connections = [
    // Thumb
    [0,1],[1,2],[2,3],[3,4],
    // Index
    [0,5],[5,6],[6,7],[7,8],
    // Middle
    [5,9],[9,10],[10,11],[11,12],
    // Ring
    [9,13],[13,14],[14,15],[15,16],
    // Pinky
    [13,17],[17,18],[18,19],[19,20],
    // Palm
    [0,17]
  ];

  const baseColor = hIdx === 0 ? '0,255,238' : '255,0,170';

  connections.forEach(([a, b]) => {
    const ax = lms[a].x * canvas.width, ay = lms[a].y * canvas.height;
    const bx = lms[b].x * canvas.width, by = lms[b].y * canvas.height;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.strokeStyle = `rgba(${baseColor},0.35)`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
}

// ─── WebSocket / TouchDesigner ─────────────────────────────────────
function toggleWS() {
  if (!wsConnected) {
    connectWS();
  } else {
    disconnectWS();
  }
}

function connectWS() {
  const host = document.getElementById('wsHost').value.trim();
  const port = document.getElementById('wsPort').value.trim();
  const url  = `ws://${host}:${port}`;

  try {
    ws = new WebSocket(url);
    dotWS.className = 'dot warn pulsing';
    btnWS.textContent = '⟳ ŁĄCZENIE...';

    ws.onopen = () => {
      wsConnected = true;
      dotWS.className = 'dot ok';
      btnWS.textContent = '✕ DISCONNECT TD';
      btnWS.classList.add('connected');
      ticker.textContent = 'Połączono z TouchDesigner na ' + url;
    };

    ws.onclose = () => {
      wsConnected = false;
      dotWS.className = 'dot';
      btnWS.textContent = '⬡ CONNECT TD';
      btnWS.classList.remove('connected');
    };

    ws.onerror = () => {
      ticker.textContent = `Błąd: nie można połączyć z ${url}`;
      dotWS.className = 'dot warn';
    };

  } catch(e) {
    ticker.textContent = 'Błąd WebSocket: ' + e.message;
  }
}

function disconnectWS() {
  if (ws) { ws.close(); ws = null; }
  wsConnected = false;
  dotWS.className = 'dot';
  btnWS.textContent = '⬡ CONNECT TD';
  btnWS.classList.remove('connected');
}

function sendToTD(data) {
  if (!wsConnected || !ws || ws.readyState !== WebSocket.OPEN) return;
  const payload = {
    type: 'fingertrack',
    timestamp: Date.now(),
    fps: fps,
    hands: data ?? []
  };
  ws.send(JSON.stringify(payload));
}
</script>
</body>
</html>
