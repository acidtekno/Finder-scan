<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FingerTrack → TouchDesigner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@300;600;800&display=swap');

  :root {
    --cyan: #00ffee;
    --magenta: #ff00aa;
    --orange: #ff6600;
    --bg: #050810;
    --panel: rgba(0,20,40,0.88);
    --border: rgba(0,255,238,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,255,238,0.013) 2px, rgba(0,255,238,0.013) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Oxanium', monospace;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.1em;
  }
  .logo span { color: var(--magenta); }

  .status-row {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .dot.active { background: var(--cyan);   box-shadow: 0 0 8px var(--cyan); }
  .dot.warn   { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .dot.ok     { background: #00ff88;       box-shadow: 0 0 8px #00ff88; }

  .cam-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  video {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 0;
    filter: brightness(0.3) saturate(0.5);
  }

  canvas#overlay {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: rgba(0,255,238,0.4);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    z-index: 2;
    background: var(--bg);
    text-align: center;
    padding: 20px;
  }

  .placeholder svg { width: 64px; height: 64px; opacity: 0.3; }

  .corner { position: absolute; width: 24px; height: 24px; opacity: 0.4; z-index: 3; }
  .corner.tl { top:8px;    left:8px;  border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.tr { top:8px;    right:8px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
  .corner.bl { bottom:8px; left:8px;  border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.br { bottom:8px; right:8px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

  .fps {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: rgba(0,255,238,0.5);
    letter-spacing: 0.1em;
    z-index: 3;
  }

  .loading-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--cyan);
    width: 0%;
    transition: width 0.4s;
    box-shadow: 0 0 8px var(--cyan);
    z-index: 4;
  }

  .panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(10px);
    padding: 10px 14px;
    flex-shrink: 0;
    z-index: 10;
  }

  .panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .field-group { display: flex; flex-direction: column; gap: 4px; }

  label {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    color: rgba(0,255,238,0.55);
    text-transform: uppercase;
  }

  input[type="text"] {
    background: rgba(0,255,238,0.05);
    border: 1px solid var(--border);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 2px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--cyan); }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  button {
    font-family: 'Oxanium', monospace;
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 0;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    flex: 1;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  #btnCam { background: var(--cyan); color: var(--bg); }
  #btnCam:active { transform: scale(0.97); }
  #btnCam.active { background: var(--magenta); color: #fff; }

  #btnWS { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
  #btnWS:active { transform: scale(0.97); }
  #btnWS.connected { border-color: #00ff88; color: #00ff88; }

  .ticker {
    margin-top: 8px;
    font-size: 0.6rem;
    color: rgba(0,255,238,0.45);
    letter-spacing: 0.04em;
    height: 16px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pulsing { animation: pulse 1s infinite; }
</style>
</head>
<body>

<header>
  <div class="logo">FINGER<span>TRACK</span></div>
  <div class="status-row">
    <div class="dot" id="dotCam"></div><span>CAM</span>
    <div class="dot" id="dotMP"></div><span>ML</span>
    <div class="dot" id="dotWS"></div><span>TD</span>
  </div>
</header>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div class="placeholder" id="placeholder">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="16" width="48" height="36" rx="4" stroke="currentColor" stroke-width="2"/>
      <circle cx="32" cy="34" r="10" stroke="currentColor" stroke-width="2"/>
      <circle cx="32" cy="34" r="4" fill="currentColor"/>
      <rect x="24" y="12" width="16" height="6" rx="2" stroke="currentColor" stroke-width="2"/>
    </svg>
    <span id="placeholderMsg">Kliknij START aby włączyć kamerę</span>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="fps" id="fpsDisplay"></div>
  <div class="loading-bar" id="loadingBar"></div>
</div>

<div class="panel">
  <div class="panel-grid">
    <div class="field-group">
      <label>TouchDesigner IP</label>
      <input type="text" id="wsHost" value="192.168.1.100">
    </div>
    <div class="field-group">
      <label>Port WebSocket</label>
      <input type="text" id="wsPort" value="9980">
    </div>
  </div>
  <div class="btn-row">
    <button id="btnCam" onclick="toggleCamera()">▶ START</button>
    <button id="btnWS"  onclick="toggleWS()">⬡ CONNECT TD</button>
  </div>
  <div class="ticker" id="ticker">oczekiwanie...</div>
</div>

<!-- ONLY @mediapipe/hands — Camera utility removed (causes NotReadableError on iOS) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

<script>
const video          = document.getElementById('video');
const canvas         = document.getElementById('overlay');
const ctx            = canvas.getContext('2d');
const dotCam         = document.getElementById('dotCam');
const dotMP          = document.getElementById('dotMP');
const dotWS          = document.getElementById('dotWS');
const btnCam         = document.getElementById('btnCam');
const btnWS          = document.getElementById('btnWS');
const ticker         = document.getElementById('ticker');
const fpsEl          = document.getElementById('fpsDisplay');
const placeholder    = document.getElementById('placeholder');
const placeholderMsg = document.getElementById('placeholderMsg');
const loadingBar     = document.getElementById('loadingBar');
const camWrap        = document.getElementById('camWrap');

let hands = null, rafId = null, ws = null;
let camActive = false, wsConnected = false, processing = false;
let fps = 0, frameCount = 0, lastFPSTime = performance.now();

const FINGER_TIPS   = [4, 8, 12, 16, 20];
const FINGER_NAMES  = ['THUMB','INDEX','MIDDLE','RING','PINKY'];
const FINGER_COLORS = ['#ff6600','#00ffee','#ff00aa','#aaff00','#aa00ff'];

// ── Canvas resize ──────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width  = camWrap.offsetWidth;
  canvas.height = camWrap.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── MediaPipe init ─────────────────────────────────────────────────
function initMediaPipe() {
  dotMP.className = 'dot warn pulsing';

  hands = new Hands({
    locateFile: f =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.55,
  });
  hands.onResults(onResults);
}

// ── Camera ─────────────────────────────────────────────────────────
async function toggleCamera() {
  if (camActive) { stopCamera(); return; }
  await startCamera();
}

async function startCamera() {
  if (!hands) initMediaPipe();

  dotCam.className = 'dot warn pulsing';
  loadingBar.style.width = '15%';

  // Try from simplest to most specific — avoids NotReadableError on iOS
  const tries = [
    { video: true,                             audio: false },
    { video: { facingMode: 'environment' },    audio: false },
    { video: { facingMode: 'user' },           audio: false },
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }, audio: false },
  ];

  let stream = null;

  for (let i = 0; i < tries.length; i++) {
    try {
      placeholderMsg.textContent = `Próba ${i+1}/${tries.length}...`;
      stream = await navigator.mediaDevices.getUserMedia(tries[i]);
      break;
    } catch(e) {
      console.warn(`Próba ${i+1} nieudana:`, e.name, e.message);
      if (i < tries.length - 1) await sleep(350);
    }
  }

  if (!stream) {
    dotCam.className = 'dot warn';
    placeholderMsg.textContent = '❌ Kamera niedostępna. Zamknij inne apki i odśwież stronę.';
    ticker.textContent = 'Błąd: NotReadableError — inna apka trzyma kamerę';
    btnCam.textContent = '▶ START';
    loadingBar.style.width = '0%';
    return;
  }

  video.srcObject = stream;

  // Wait for metadata then play
  await new Promise(resolve => {
    video.onloadedmetadata = () => resolve();
    video.onerror = () => resolve();
  });

  try { await video.play(); } catch(e) { console.warn('play():', e); }

  placeholder.style.display = 'none';
  dotCam.className = 'dot ok';
  loadingBar.style.width = '60%';

  const t = stream.getVideoTracks()[0];
  const s = t.getSettings();
  ticker.textContent = `Kamera: ${s.width||'?'}×${s.height||'?'} | ${(t.label||'unknown').slice(0,28)}`;

  camActive = true;
  btnCam.textContent = '■ STOP';
  btnCam.classList.add('active');

  // Warm up model with first frame
  try {
    await hands.send({ image: video });
    dotMP.className = 'dot ok';
  } catch(e) {
    dotMP.className = 'dot ok'; // non-fatal
  }

  loadingBar.style.width = '100%';
  setTimeout(() => loadingBar.style.width = '0%', 500);

  startLoop();
}

function startLoop() {
  async function loop() {
    if (!camActive) return;

    if (!processing && video.readyState >= 2 && !video.paused) {
      processing = true;
      try { await hands.send({ image: video }); }
      catch(e) { console.warn(e); }
      processing = false;

      frameCount++;
      const now = performance.now();
      if (now - lastFPSTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFPSTime = now;
        fpsEl.textContent = fps + ' FPS';
      }
    }

    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function stopCamera() {
  camActive = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  btnCam.textContent = '▶ START';
  btnCam.classList.remove('active');
  dotCam.className = 'dot';
  dotMP.className = 'dot';
  placeholder.style.display = 'flex';
  placeholderMsg.textContent = 'Kliknij START aby włączyć kamerę';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  fpsEl.textContent = '';
}

// ── Rendering ──────────────────────────────────────────────────────
function onResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.scale(-1, 1);
  ctx.translate(-canvas.width, 0);

  if (!results.multiHandLandmarks?.length) {
    ctx.restore();
    sendToTD(null);
    return;
  }

  const tdData = [];

  results.multiHandLandmarks.forEach((lms, hi) => {
    const side = results.multiHandedness?.[hi]?.label || 'Hand';

    drawSkeleton(lms, hi);
    drawLandmarks(lms, hi);

    ctx.font = '600 10px Oxanium, monospace';
    ctx.fillStyle = hi === 0 ? '#00ffee' : '#ff00aa';
    ctx.textAlign = 'center';
    ctx.fillText(side.toUpperCase(), lms[0].x * canvas.width, lms[0].y * canvas.height + 22);

    tdData.push({
      hand: side,
      fingers: FINGER_TIPS.map((ti, fi) => ({
        name: FINGER_NAMES[fi],
        x: parseFloat((1 - lms[ti].x).toFixed(4)),
        y: parseFloat(lms[ti].y.toFixed(4)),
        z: parseFloat(lms[ti].z.toFixed(4))
      }))
    });
  });

  ctx.restore();

  if (tdData.length) {
    const f = tdData[0].fingers;
    ticker.textContent = `[${tdData[0].hand}] IDX(${f[1].x},${f[1].y}) MID(${f[2].x},${f[2].y})`;
  } else {
    ticker.textContent = 'brak dłoni w kadrze';
  }

  sendToTD(tdData.length ? tdData : null);
}

function drawSkeleton(lms, hi) {
  const pairs = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],
    [0,17]
  ];
  const rgb = hi === 0 ? '0,255,238' : '255,0,170';
  ctx.strokeStyle = `rgba(${rgb},0.55)`;
  ctx.lineWidth = 1.5;
  pairs.forEach(([a,b]) => {
    ctx.beginPath();
    ctx.moveTo(lms[a].x * canvas.width, lms[a].y * canvas.height);
    ctx.lineTo(lms[b].x * canvas.width, lms[b].y * canvas.height);
    ctx.stroke();
  });
}

function drawLandmarks(lms, hi) {
  lms.forEach((lm, i) => {
    const x  = lm.x * canvas.width;
    const y  = lm.y * canvas.height;
    const fi = FINGER_TIPS.indexOf(i);

    if (fi >= 0) {
      const col = FINGER_COLORS[fi];

      // Outer soft glow (large)
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 42);
      grad.addColorStop(0,   col + 'aa');
      grad.addColorStop(0.4, col + '44');
      grad.addColorStop(1,   col + '00');
      ctx.beginPath();
      ctx.arc(x, y, 42, 0, Math.PI*2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Mid ring
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, Math.PI*2);
      ctx.strokeStyle = col + '88';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Solid core dot
      ctx.beginPath();
      ctx.arc(x, y, 12, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();

      // White center
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();

      // Crosshair lines
      ctx.globalAlpha = 0.7;
      ctx.strokeStyle = col;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x-34,y); ctx.lineTo(x+34,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y-34); ctx.lineTo(x,y+34); ctx.stroke();
      ctx.globalAlpha = 1;

      // Label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.shadowColor = col;
      ctx.shadowBlur = 8;
      ctx.fillText(FINGER_NAMES[fi][0], x, y - 28);
      ctx.shadowBlur = 0;
    } else {
      // Non-tip joints: small dim dot
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,255,238,0.35)';
      ctx.fill();
    }
  });
}

// ── WebSocket / TouchDesigner ──────────────────────────────────────
function toggleWS() {
  wsConnected ? disconnectWS() : connectWS();
}

function connectWS() {
  const host = document.getElementById('wsHost').value.trim();
  const port = document.getElementById('wsPort').value.trim();
  const url  = `ws://${host}:${port}`;

  ws = new WebSocket(url);
  dotWS.className = 'dot warn pulsing';
  btnWS.textContent = '⟳ ŁĄCZENIE...';

  ws.onopen  = () => {
    wsConnected = true;
    dotWS.className = 'dot ok';
    btnWS.textContent = '✕ DISCONNECT';
    btnWS.classList.add('connected');
    ticker.textContent = `Połączono z TouchDesigner @ ${url}`;
  };
  ws.onclose = () => {
    wsConnected = false;
    dotWS.className = 'dot';
    btnWS.textContent = '⬡ CONNECT TD';
    btnWS.classList.remove('connected');
  };
  ws.onerror = () => {
    ticker.textContent = `❌ Brak połączenia z ${url}`;
    dotWS.className = 'dot warn';
  };
}

function disconnectWS() {
  if (ws) { ws.close(); ws = null; }
  wsConnected = false;
  dotWS.className = 'dot';
  btnWS.textContent = '⬡ CONNECT TD';
  btnWS.classList.remove('connected');
}

function sendToTD(data) {
  if (!wsConnected || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type:'fingertrack', timestamp:Date.now(), fps, hands: data ?? [] }));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
