<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FingerTrack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@600;800&display=swap');
:root{--c:#00ffee;--m:#ff00aa;--o:#ff6600;--g:#00ff88;--bg:#050810;--pan:rgba(0,18,36,.92);--brd:rgba(0,255,238,.14)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--c);font-family:'Share Tech Mono',monospace;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,238,.012) 2px,rgba(0,255,238,.012) 4px);pointer-events:none;z-index:100}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--brd);background:var(--pan);flex-shrink:0;z-index:10}
.logo{font-family:'Oxanium',monospace;font-weight:800;font-size:1rem;letter-spacing:.1em}
.logo span{color:var(--m)}
.sr{display:flex;gap:10px;align-items:center;font-size:.6rem}
.dot{width:8px;height:8px;border-radius:50%;background:#222;transition:background .3s,box-shadow .3s;flex-shrink:0}
.dot.ok{background:var(--g);box-shadow:0 0 8px var(--g)}
.dot.warn{background:var(--o);box-shadow:0 0 8px var(--o)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.pulsing{animation:pulse 1s infinite}

/* Camera area */
.wrap{flex:1;position:relative;overflow:hidden}
video{position:absolute;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0;filter:brightness(.28) saturate(.5)}
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}

/* Placeholder */
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:rgba(0,255,238,.4);font-size:.75rem;letter-spacing:.1em;z-index:6;background:var(--bg);text-align:center;padding:20px}
.ph svg{width:56px;height:56px;opacity:.25}

/* Corner decorations */
.corner{position:absolute;width:22px;height:22px;opacity:.35;z-index:3;pointer-events:none}
.tl{top:8px;left:8px;border-top:2px solid var(--c);border-left:2px solid var(--c)}
.tr{top:8px;right:8px;border-top:2px solid var(--c);border-right:2px solid var(--c)}
.bl{bottom:8px;left:8px;border-bottom:2px solid var(--c);border-left:2px solid var(--c)}
.br{bottom:8px;right:8px;border-bottom:2px solid var(--c);border-right:2px solid var(--c)}

/* FPS + loading bar */
.fps{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(0,255,238,.45);z-index:3;letter-spacing:.1em;pointer-events:none}
.bar{position:absolute;bottom:0;left:0;height:2px;background:var(--c);width:0%;transition:width .4s;box-shadow:0 0 8px var(--c);z-index:4}

/* Score */
.score{position:absolute;top:12px;right:12px;font-family:'Oxanium',monospace;font-weight:800;font-size:1.8rem;color:#fff;text-shadow:0 0 20px var(--m),0 0 40px var(--m);z-index:5;pointer-events:none;transition:transform .1s;display:none}
.score.pop{transform:scale(1.4)}
.combo{position:absolute;top:54px;right:12px;font-family:'Oxanium',monospace;font-weight:600;font-size:.75rem;color:var(--o);text-shadow:0 0 10px var(--o);z-index:5;pointer-events:none;opacity:0;transition:opacity .3s;display:none}
.combo.show{opacity:1}

/* HP bar */
#hpWrap{position:absolute;left:10px;top:10px;z-index:5;pointer-events:none;display:none;flex-direction:column;gap:3px}
#hpBar{width:130px;height:13px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:7px;overflow:hidden}
#hpFill{height:100%;width:100%;background:linear-gradient(90deg,var(--g),#aaff00);border-radius:7px;transition:width .12s,background .4s}
#hpLabel{font-size:.55rem;letter-spacing:.1em;color:rgba(255,255,255,.6)}
#ballCount{font-size:.58rem;color:var(--c);letter-spacing:.05em}
#missCount{font-size:.58rem;color:var(--m);letter-spacing:.05em}

/* Zone overlays */
.zone{position:absolute;left:0;right:0;pointer-events:none;z-index:2;opacity:0;transition:opacity .5s}
.zone.on{opacity:1}
#zDmg{top:0;height:50%;background:linear-gradient(180deg,rgba(255,50,50,.13) 0%,transparent 100%);border-bottom:1px dashed rgba(255,60,60,.35)}
#zNeu{top:50%;height:25%;border-bottom:1px dashed rgba(255,255,255,.12)}
#zHeal{top:75%;height:25%;background:linear-gradient(0deg,rgba(0,255,136,.16) 0%,transparent 100%);border-top:1px dashed rgba(0,255,136,.35)}

/* Game over screen */
#goScreen{position:absolute;inset:0;z-index:20;background:rgba(5,8,16,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
#goTitle{font-family:'Oxanium',monospace;font-weight:800;font-size:2rem;color:var(--m);text-shadow:0 0 30px var(--m)}
#goScore{font-family:'Oxanium',monospace;font-size:1.4rem;color:#fff;text-shadow:0 0 16px var(--c)}
#goStats{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:rgba(0,255,238,.7);line-height:1.9}
#goBtn{font-family:'Oxanium',monospace;font-weight:600;font-size:.8rem;letter-spacing:.12em;padding:12px 36px;background:var(--c);color:var(--bg);border:none;border-radius:2px;cursor:pointer;margin-top:6px;-webkit-tap-highlight-color:transparent}

/* Bottom panel */
.panel{background:var(--pan);border-top:1px solid var(--brd);padding:10px 14px;flex-shrink:0;z-index:10}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg{display:flex;flex-direction:column;gap:4px}
label{font-size:.55rem;letter-spacing:.12em;color:rgba(0,255,238,.5);text-transform:uppercase}
input{background:rgba(0,255,238,.05);border:1px solid var(--brd);color:var(--c);font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:6px 10px;border-radius:2px;width:100%;outline:none}
input:focus{border-color:var(--c)}
.btns{display:flex;gap:6px;margin-top:10px}
button{font-family:'Oxanium',monospace;font-weight:600;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:9px 0;border:none;border-radius:2px;cursor:pointer;flex:1;transition:transform .12s;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.96)}
#bCam{background:var(--c);color:var(--bg)}
#bCam.on{background:var(--m);color:#fff}
#bGame{background:transparent;border:1px solid var(--m);color:var(--m)}
#bGame.on{background:var(--m);color:#fff}
#bWs{background:transparent;border:1px solid var(--c);color:var(--c);font-size:.55rem}
#bWs.on{border-color:var(--g);color:var(--g)}
.tick{margin-top:8px;font-size:.6rem;color:rgba(0,255,238,.45);height:16px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
</style>
</head>
<body>

<header>
  <div class="logo">FINGER<span>TRACK</span></div>
  <div class="sr">
    <div class="dot" id="dCam"></div><span>CAM</span>
    <div class="dot" id="dML"></div><span>ML</span>
    <div class="dot" id="dWS"></div><span>TD</span>
  </div>
</header>

<div class="wrap" id="wrap">
  <video id="vid" autoplay playsinline webkit-playsinline muted></video>
  <canvas id="cvs"></canvas>

  <div class="ph" id="ph">
    <svg viewBox="0 0 64 64" fill="none"><rect x="8" y="16" width="48" height="36" rx="4" stroke="currentColor" stroke-width="2"/><circle cx="32" cy="34" r="10" stroke="currentColor" stroke-width="2"/><circle cx="32" cy="34" r="4" fill="currentColor"/></svg>
    <span id="phMsg">Naciśnij START</span>
  </div>

  <!-- Zone overlays -->
  <div class="zone" id="zDmg"></div>
  <div class="zone" id="zNeu"></div>
  <div class="zone" id="zHeal"></div>

  <!-- HP bar (top-left) -->
  <div id="hpWrap">
    <div id="hpBar"><div id="hpFill"></div></div>
    <div id="hpLabel">HP 100/100</div>
    <div id="ballCount">0/100 piłek</div>
    <div id="missCount">Przepuścić: 100</div>
  </div>

  <!-- Score (top-right) -->
  <div class="score" id="scoreEl">0</div>
  <div class="combo" id="comboEl"></div>

  <!-- Game over screen -->
  <div id="goScreen">
    <div id="goTitle">GAME OVER</div>
    <div id="goScore"></div>
    <div id="goStats"></div>
    <button id="goBtn" onclick="startGame()">▶ ZAGRAJ PONOWNIE</button>
  </div>

  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="fps" id="fpsEl"></div>
  <div class="bar" id="bar"></div>
</div>

<div class="panel">
  <div class="grid">
    <div class="fg"><label>TouchDesigner IP</label><input id="wHost" value="192.168.1.100"></div>
    <div class="fg"><label>Port</label><input id="wPort" value="9980"></div>
  </div>
  <div class="btns">
    <button id="bCam"  onclick="toggleCam()">▶ START</button>
    <button id="bGame" onclick="toggleGame()">🎮 GRA</button>
    <button id="bWs"   onclick="toggleWS()">⬡ TD</button>
  </div>
  <div class="tick" id="tick">oczekiwanie...</div>
</div>

let skullSprite = null; // processed canvas with black removed

function loadSkull() {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      // Draw to offscreen canvas, remove black bg
      const sc = document.createElement('canvas');
      sc.width  = img.width;
      sc.height = img.height;
      const sx  = sc.getContext('2d');
      sx.drawImage(img, 0, 0);
      const id  = sx.getImageData(0, 0, sc.width, sc.height);
      const d   = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const r=d[i], g=d[i+1], b=d[i+2];
        // If pixel is dark (close to black) → transparent
        const brightness = (r+g+b)/3;
        if (brightness < 38) { d[i+3] = 0; }
        else if (brightness < 70) { d[i+3] = Math.round((brightness-38)/32*255); }
      }
      sx.putImageData(id, 0, 0);
      skullSprite = sc;
      res();
    };
    img.src = SKULL_SRC;
  });
}

// ── Model ──────────────────────────────────────────────────────────
async function loadModel() {
  dML.className = 'dot warn pulsing';
  setBar(20); tick.textContent = 'Ładuję model TF.js...';
  await tf.setBackend('webgl');
  await tf.ready();
  detector = await handPoseDetection.createDetector(
    handPoseDetection.SupportedModels.MediaPipeHands,
    { runtime:'tfjs', modelType:'lite', maxHands:2, scoreThreshold:0.4 }
  );
  dML.className = 'dot ok';
  setBar(0); tick.textContent = 'Model gotowy — włącz kamerę';
}

// ── Camera ─────────────────────────────────────────────────────────
async function toggleCam(){ camOn ? stopCam() : await startCam(); }

async function startCam() {
  if (!detector) await loadModel();
  dCam.className = 'dot warn pulsing';
  setBar(15);
  const tries = [
    { video:true, audio:false },
    { video:{facingMode:'environment'}, audio:false },
    { video:{facingMode:'user'}, audio:false },
    { video:{facingMode:{ideal:'environment'},width:{ideal:1280}}, audio:false },
  ];
  let stream = null;
  for (let i=0; i<tries.length; i++) {
    try { phMsg.textContent=`Próba ${i+1}...`; stream=await navigator.mediaDevices.getUserMedia(tries[i]); break; }
    catch(e){ if(i<tries.length-1) await sleep(300); }
  }
  if (!stream) { dCam.className='dot warn'; phMsg.textContent='❌ Brak kamery. Zamknij inne apki.'; setBar(0); return; }

  vid.srcObject = stream;
  await new Promise(res => { vid.onloadedmetadata = res; });
  try { await vid.play(); } catch(e){}

  ph.style.display = 'none';
  dCam.className = 'dot ok';
  const t = stream.getVideoTracks()[0].getSettings();
  tick.textContent = `Kamera ${t.width||'?'}×${t.height||'?'} | pokaż rękę`;
  camOn = true; bCam.textContent='■ STOP'; bCam.classList.add('on');
  setBar(100); setTimeout(()=>setBar(0),500);
  loop();
}

function stopCam() {
  if (gameOn) stopGame();
  camOn = false; busy = false;
  if (rafId){ cancelAnimationFrame(rafId); rafId=null; }
  if (vid.srcObject){ vid.srcObject.getTracks().forEach(t=>t.stop()); vid.srcObject=null; }
  bCam.textContent='▶ START'; bCam.classList.remove('on');
  dCam.className='dot';
  ph.style.display='flex'; phMsg.textContent='Naciśnij START';
  ctx.clearRect(0,0,cvs.width,cvs.height); fpsEl.textContent='';
}

// ── Detection loop ─────────────────────────────────────────────────
async function loop() {
  if (!camOn) return;
  rafId = requestAnimationFrame(loop);
  if (busy || vid.readyState<2 || vid.paused) return;
  busy = true;
  try {
    offCvs.width  = vid.videoWidth  || 640;
    offCvs.height = vid.videoHeight || 480;
    offCtx.drawImage(vid, 0, 0, offCvs.width, offCvs.height);
    const hands = await detector.estimateHands(offCvs, {flipHorizontal:false});
    updateGame();
    drawScene(hands);
    sendTD(hands);
    fCount++;
    const now = performance.now();
    if (now - fpsT >= 1000) {
      fpsVal = Math.round(fCount*1000/(now-fpsT));
      fCount=0; fpsT=now; fpsEl.textContent=fpsVal+' FPS';
    }
    if (!gameOn){
      if (hands.length) {
        const kp=hands[0].keypoints, ix=kp[8], mi=kp[12];
        tick.textContent=`[${hands[0].handedness==='Left'?'RIGHT':'LEFT'}] IDX(${ix.x.toFixed(0)},${ix.y.toFixed(0)}) MID(${mi.x.toFixed(0)},${mi.y.toFixed(0)})`;
      } else tick.textContent='brak dłoni w kadrze';
    }
  } catch(e){ console.warn(e); }
  finally { busy=false; }
}

class Ball {
  constructor() {
    this.r   = 16 + Math.random()*24;
    this.x   = this.r + Math.random()*(cvs.width - this.r*2);
    this.y   = -this.r;
    this.vx  = (Math.random()-.5)*3;
    this.vy  = 1 + Math.random()*2;
    this.grav= 0.12 + Math.random()*0.55;
    this.col = BCOLS[Math.floor(Math.random()*BCOLS.length)];
    this.flash= 0;
    this.trail= [];
  }
  update() {
    this.trail.push({x:this.x,y:this.y});
    if (this.trail.length>7) this.trail.shift();
    this.vy += this.grav;
    this.x  += this.vx; this.y += this.vy;
    if (this.flash>0) this.flash--;
    if (this.x-this.r<0)          { this.x=this.r;           this.vx=Math.abs(this.vx)*.8; }
    if (this.x+this.r>cvs.width)  { this.x=cvs.width-this.r; this.vx=-Math.abs(this.vx)*.8; }
  }
  offTop()    { return this.y+this.r <= 0 && this.vy<0; }
  offBottom() { return this.y-this.r > cvs.height+40; }
  draw(c) {
    const s  = this.r * 2.4;    // skull display size
    const hf = this.flash > 0;

    // Ghost trail
    this.trail.forEach((p,i) => {
      if (!skullSprite) return;
      const a = (i / this.trail.length) * 0.22;
      const ts = s * (i / this.trail.length) * 0.7;
      c.globalAlpha = a;
      c.drawImage(skullSprite, p.x - ts/2, p.y - ts/2, ts, ts);
    });
    c.globalAlpha = 1;

    // Glow ring on hit flash
    if (hf) {
      const g = c.createRadialGradient(this.x,this.y,0,this.x,this.y,s*.7);
      g.addColorStop(0,'rgba(255,60,60,.9)');
      g.addColorStop(.5,'rgba(255,100,0,.5)');
      g.addColorStop(1,'rgba(255,0,0,0)');
      c.beginPath(); c.arc(this.x,this.y,s*.7,0,Math.PI*2);
      c.fillStyle=g; c.fill();
    }

    // Outer soft glow (always)
    const glow = c.createRadialGradient(this.x,this.y,0,this.x,this.y,s*.65);
    glow.addColorStop(0,'rgba(200,200,255,.18)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    c.beginPath(); c.arc(this.x,this.y,s*.65,0,Math.PI*2);
    c.fillStyle=glow; c.fill();

    // Skull sprite
    if (skullSprite) {
      c.save();
      c.translate(this.x, this.y);
      // Wobble rotation based on vx
      c.rotate(Math.sin(Date.now()*0.003 + this.x)*0.12);
      if (hf) { c.filter='brightness(2) sepia(1) saturate(5) hue-rotate(-20deg)'; }
      c.drawImage(skullSprite, -s/2, -s/2, s, s);
      c.filter='none';
      c.restore();
    }

    // Gravity label below skull
    c.font = 'bold 9px monospace';
    c.fillStyle = '#ffffff99';
    c.textAlign = 'center';
    c.fillText('g' + this.grav.toFixed(2), this.x, this.y + s/2 + 12);
  }
}

class Particle {
  constructor(x,y,col) {
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*8;
    this.x=x; this.y=y; this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd-4;
    this.r=3+Math.random()*7; this.col=col; this.life=1; this.decay=.03+Math.random()*.04;
  }
  update(){ this.vy+=.2; this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; this.r*=.97; }
  dead()  { return this.life<=0||this.r<.4; }
  draw(c) {
    c.globalAlpha = Math.max(0, this.life * 0.9);
    if (skullSprite && this.r > 2) {
      const sz = this.r * 2.5;
      c.save();
      c.translate(this.x, this.y);
      c.rotate(this.life * 6 + this.vx);
      c.drawImage(skullSprite, -sz/2, -sz/2, sz, sz);
      c.restore();
    } else {
      const g=c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2);
      g.addColorStop(0,'#fff'); g.addColorStop(.5,'#aaaaff'); g.addColorStop(1,'#00000000');
      c.beginPath(); c.arc(this.x,this.y,this.r*1.5,0,Math.PI*2); c.fillStyle=g; c.fill();
    }
    c.globalAlpha=1;
  }
}

function explodeBall(ball) {
  const n=18+Math.floor(ball.r*.8);
  for(let i=0;i<n;i++) particles.push(new Particle(ball.x,ball.y,ball.col));
  const speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  // Fast+small = more points; slow+large = fewer
  const pts=Math.max(5, Math.round(speed*18+(40-ball.r)*1.5));
  combo++; clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0;comboEl.classList.remove('show');},1500);
  const total=pts*Math.max(1,combo);
  score+=total; totalExploded++;
  scoreEl.textContent=score;
  scoreEl.classList.add('pop'); setTimeout(()=>scoreEl.classList.remove('pop'),120);
  comboEl.style.display='block';
  comboEl.textContent=`💥 +${total} (v${speed.toFixed(1)} r${ball.r.toFixed(0)}) ×${combo}`;
  comboEl.classList.add('show');
  updateCounters();
}

function updateCounters() {
  ballCount.textContent=`${totalSpawned}/100 piłek`;
  missCount.textContent=`Przepuścić: ${Math.max(0,100-totalSpawned)}`;
  // End when all 100 spawned and field clear
  if(totalSpawned>=100 && balls.length===0 && gameOn) setTimeout(()=>gameOver('Wszystkie 100 piłek!'),600);
}

function updateHpBar() {
  const pct=Math.max(0,hp/maxHp*100);
  hpFill.style.width=pct+'%';
  hpFill.style.background=
    pct>60 ? 'linear-gradient(90deg,#00ff88,#aaff00)' :
    pct>30 ? 'linear-gradient(90deg,#ff9900,#ffdd00)' :
             'linear-gradient(90deg,#ff2244,#ff6600)';
  hpLabel.textContent=`HP ${Math.ceil(hp)}/${maxHp}`;
  if(hp<=0&&gameOn){ hp=0; updateHpBar(); gameOver('Brak HP'); }
}

function updateGame() {
  if (!gameOn) return;
  balls.forEach(ball => {
    ball.update();
    fingerPositions.forEach(fp => {
      const dx=ball.x-fp.x, dy=ball.y-fp.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minD=ball.r+fp.r;
      if(dist<minD&&dist>0){
        const nx=dx/dist, ny=dy/dist;
        const spd=Math.max(Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy),5);
        ball.vx=nx*spd*1.15; ball.vy=ny*spd*1.15-2;
        ball.x=fp.x+nx*(minD+1); ball.y=fp.y+ny*(minD+1);
        ball.flash=8;
      }
    });
  });

  // Top edge → explode; bottom edge → miss
  let missed=0;
  const exploding=[];
  balls=balls.filter(b=>{
    if(b.offTop())  { exploding.push(b); return false; }
    if(b.offBottom()){ missed++; return false; }
    return true;
  });
  exploding.forEach(b=>explodeBall(b));
  if(missed>0){ totalMissed+=missed; updateCounters(); }

  // Particles
  particles.forEach(p=>p.update());
  particles=particles.filter(p=>!p.dead());

  // Zone HP effect
  const H=cvs.height;
  let anyDmg=wristPositions.some(w=>w.y<H*.5);
  let healAll=wristPositions.length>=2&&wristPositions.every(w=>w.y>=H*.75);

  if(anyDmg)        { hp=Math.max(0,hp-.28); updateHpBar(); }
  else if(healAll)  { hp=Math.min(maxHp,hp+.14); updateHpBar(); }

  // Heal zone glow
  zHeal.style.background=healAll
    ?'linear-gradient(0deg,rgba(0,255,136,.32) 0%,transparent 100%)'
    :'linear-gradient(0deg,rgba(0,255,136,.16) 0%,transparent 100%)';
  zHeal.style.borderColor=healAll?'rgba(0,255,136,.9)':'rgba(0,255,136,.35)';

  // Ball counter bar at bottom
  if(balls.length>0){
    const pct=balls.length/100;
    ctx.fillStyle=pct>.8?'#ff4444':pct>.5?'#ff6600':'rgba(0,255,238,.5)';
    ctx.globalAlpha=.6;
    ctx.fillRect(0,cvs.height-4,cvs.width*pct,4);
    ctx.globalAlpha=1;
  }

  tick.textContent=`🎮 ${score}pkt | HP:${Math.ceil(hp)} | ×${combo} | ${balls.length}🟡`;
}

function drawGame() {
  particles.forEach(p=>p.draw(ctx));
  balls.forEach(b=>b.draw(ctx));
}

function toggleGame(){ !camOn ? (tick.textContent='❌ Najpierw włącz kamerę!') : gameOn ? stopGame() : startGame(); }

function startGame() {
  gameOn=true; score=0; combo=0; balls=[]; particles=[];
  hp=100; totalSpawned=0; totalExploded=0; totalMissed=0;
  goScreen.style.display='none';
  scoreEl.style.display='block'; scoreEl.textContent='0';
  comboEl.style.display='block';
  hpWrap.style.display='flex';
  // Full HP bar immediately
  hpFill.style.width='100%';
  hpFill.style.background='linear-gradient(90deg,#00ff88,#aaff00)';
  hpLabel.textContent='HP 100/100';
  ballCount.textContent='0/100 piłek';
  missCount.textContent='Przepuścić: 100';
  [zDmg,zNeu,zHeal].forEach(z=>z.classList.add('on'));
  bGame.textContent='⏹ STOP'; bGame.classList.add('on');
  const doStart = () => { spawnTimer=setInterval(spawnBall,2000); spawnBall(); };
  if (skullSprite) { doStart(); }
  else { loadSkull().then(doStart); }
}

function spawnBall() {
  if(!gameOn||!camOn||totalSpawned>=100) return;
  balls.push(new Ball()); totalSpawned++;
  updateCounters();
}

function stopGame() {
  gameOn=false;
  if(spawnTimer){ clearInterval(spawnTimer); spawnTimer=null; }
  balls=[]; particles=[];
  goScreen.style.display='none';
  scoreEl.style.display='none';
  comboEl.style.display='none'; comboEl.classList.remove('show');
  hpWrap.style.display='none';
  [zDmg,zNeu,zHeal].forEach(z=>z.classList.remove('on'));
  bGame.textContent='🎮 GRA'; bGame.classList.remove('on');
}

function gameOver(reason) {
  if(!gameOn) return;
  gameOn=false;
  if(spawnTimer){ clearInterval(spawnTimer); spawnTimer=null; }
  balls=[]; particles=[];
  bGame.textContent='🎮 GRA'; bGame.classList.remove('on');
  [zDmg,zNeu,zHeal].forEach(z=>z.classList.remove('on'));
  hpWrap.style.display='none';
  scoreEl.style.display='none';
  comboEl.style.display='none'; comboEl.classList.remove('show');

  goScore.textContent=`★  ${score}  PUNKTÓW  ★`;
  goStats.innerHTML=
    `Powód końca: ${reason}<br>`+
    `Piłek wystrzelono: ${totalSpawned}/100<br>`+
    `Eksplozji (cel+top): ${totalExploded}<br>`+
    `Przepuszczono: ${totalMissed}`;
  goScreen.style.display='flex';
  tick.textContent=`💀 GAME OVER — ${score} pkt`;
}

// ══════════════════════════════════════════════════════
//  DRAWING
// ══════════════════════════════════════════════════════

function drawScene(hands) {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  drawGame();
  fingerPositions=[]; wristPositions=[];
  if(!hands.length) return;

  const vw=vid.videoWidth||offCvs.width||cvs.width;
  const vh=vid.videoHeight||offCvs.height||cvs.height;
  const sw=cvs.width/vw, sh=cvs.height/vh;

  hands.forEach((hand,hi)=>{
    const kp=hand.keypoints;
    const rgb=hi===0?'0,255,238':'255,0,170';

    // Skeleton
    ctx.strokeStyle=`rgba(${rgb},.5)`; ctx.lineWidth=2;
    CONN.forEach(([a,b])=>{
      if(!kp[a]||!kp[b]) return;
      ctx.beginPath();
      ctx.moveTo(cvs.width-kp[a].x*sw, kp[a].y*sh);
      ctx.lineTo(cvs.width-kp[b].x*sw, kp[b].y*sh);
      ctx.stroke();
    });

    // Joints
    kp.forEach((p,i)=>{
      if(Object.values(TIPS).includes(i)) return;
      ctx.beginPath(); ctx.arc(cvs.width-p.x*sw,p.y*sh,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rgb},.4)`; ctx.fill();
    });

    // Fingertips
    TKEYS.forEach((name,fi)=>{
      const p=kp[TIPS[name]]; if(!p) return;
      const x=cvs.width-p.x*sw, y=p.y*sh;
      const col=FCOLS[fi];
      fingerPositions.push({x,y,r:26});

      // Glow
      const g=ctx.createRadialGradient(x,y,0,x,y,46);
      g.addColorStop(0,col+'cc'); g.addColorStop(.35,col+'55'); g.addColorStop(1,col+'00');
      ctx.beginPath(); ctx.arc(x,y,46,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      // Ring
      ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2);
      ctx.strokeStyle=col+'99'; ctx.lineWidth=2.5; ctx.stroke();
      // Core
      ctx.beginPath(); ctx.arc(x,y,12,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      // Centre
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      // Crosshair
      ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.globalAlpha=.55;
      ctx.beginPath(); ctx.moveTo(x-34,y); ctx.lineTo(x+34,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y-34); ctx.lineTo(x,y+34); ctx.stroke();
      ctx.globalAlpha=1;
      // Label
      ctx.font='bold 10px monospace'; ctx.fillStyle='#fff'; ctx.textAlign='center';
      ctx.shadowColor=col; ctx.shadowBlur=8;
      ctx.fillText(name[0],x,y-28); ctx.shadowBlur=0;
    });

    // Wrist + hand label
    const w=kp[0];
    if(w){
      const wx=cvs.width-w.x*sw, wy=w.y*sh;
      // Swap Left↔Right to match mirror
      const label=hand.handedness==='Left'?'RIGHT':'LEFT';
      ctx.font='600 11px Oxanium,monospace';
      ctx.fillStyle=`rgba(${rgb},1)`; ctx.textAlign='center';
      ctx.fillText(label,wx,wy+24);
      if(gameOn){
        wristPositions.push({x:wx,y:wy,hand:label});
        const H=cvs.height;
        let zL,zC;
        if(wy<H*.5)       {zL='⚠ DMG'; zC='#ff4444';}
        else if(wy>=H*.75){zL='+HEAL'; zC='#00ff88';}
        else               {zL='NEU';   zC='#888';}
        ctx.font='bold 9px monospace'; ctx.fillStyle=zC;
        ctx.fillText(zL,wx,wy+38);
      }
    }
  });
}

// ── WebSocket / TouchDesigner ──────────────────────────────────────
function toggleWS(){ wsOn?disconnectWS():connectWS(); }
function connectWS(){
  const url=`ws://${document.getElementById('wHost').value.trim()}:${document.getElementById('wPort').value.trim()}`;
  ws=new WebSocket(url); dWS.className='dot warn pulsing'; bWs.textContent='⟳...';
  ws.onopen =()=>{ wsOn=true; dWS.className='dot ok'; bWs.textContent='✕ DISC'; bWs.classList.add('on'); };
  ws.onclose=()=>{ wsOn=false; dWS.className='dot'; bWs.textContent='⬡ TD'; bWs.classList.remove('on'); };
  ws.onerror=()=>{ tick.textContent='❌ Błąd TD'; dWS.className='dot warn'; };
}
function disconnectWS(){ if(ws)ws.close(); wsOn=false; dWS.className='dot'; bWs.textContent='⬡ TD'; bWs.classList.remove('on'); }
function sendTD(hands){
  if(!wsOn||!ws||ws.readyState!==WebSocket.OPEN) return;
  const vw=vid.videoWidth||640, vh=vid.videoHeight||480;
  const sw=cvs.width/vw, sh=cvs.height/vh;
  const payload=hands.map(h=>({
    hand:h.handedness==='Left'?'Right':'Left',
    fingers:TKEYS.map((name,fi)=>{const p=h.keypoints[TIPS[name]];return{name,x:+((cvs.width-p.x*sw)/cvs.width).toFixed(4),y:+(p.y*sh/cvs.height).toFixed(4)};})
  }));
  ws.send(JSON.stringify({type:'fingertrack',ts:Date.now(),fps:fpsVal,hands:payload}));
}

// ── Utils ──────────────────────────────────────────────────────────
function setBar(pct){ bar.style.width=pct+'%'; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// Preload model immediately
loadModel().catch(e=>{ dML.className='dot warn'; tick.textContent='Błąd modelu: '+e.message; });
</script>
